<!DOCTYPE html>
<html>
<head>
  <title>Important Survey 😌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5);
      padding: 20px;
      overflow-x: hidden;
    }

    h1, h2 {
      color: #ff4d88;
      animation: fadeIn 1s ease;
    }

    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: #ff66a3;
      color: white;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #reaction {
      margin-top: 10px;
      font-style: italic;
      color: #555;
      min-height: 20px;
    }

    .hidden { display: none; }

    .fade {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #progressBar {
      width: 0%;
      height: 8px;
      background: #ff4d88;
      border-radius: 10px;
      transition: width 0.4s ease;
      margin-bottom: 15px;
    }

    #progressContainer {
      width: 100%;
      background: #ffd6e7;
      border-radius: 10px;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

<!-- START PAGE -->
<div id="startPage">
  <h1>Hey 😌</h1>
  <p>I made something for you… don’t overthink it 😂</p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ PAGE -->
<div id="quizPage" class="hidden">
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <h2 id="question"></h2>
  <div id="options"></div>
  <div id="reaction"></div>
</div>

<!-- FINAL PAGE -->
<div id="final" class="hidden">
  <h1>Results are in… 😏</h1>
  <p id="resultText"></p>
  <p>Okay jokes apart… I like this version of us 🤍</p>
</div>

<script>
const name = "YOU"; // change her name

let score = 0;
let qIndex = 0;

const questions = [
  { q: "First impression of me? 😏", options: [["Decent",1],["Overrated",0],["Wow 👀",2]] },
  { q: "Who liked whom first? 😂", options: [["You 😌",2],["Me 😌",0],["Mutual",1]] },
  { q: "My most annoying habit? 😤", options: [["Overthinking",1],["Too cute",2],["Late replies",1],["All 😑",0]] },
  { q: "Secretly like what about me? 👀", options: [["Personality",1],["Face",2],["Vibe",2],["Won’t tell",0]] },
  { q: "If we meet now? 😏", options: [["Food",2],["Drive",2],["Fight+chill",1],["Stare 😌",2]] },
  { q: "Describe us 😂", options: [["Complicated cute",2],["Not just friends",2],["Chaos+comfort",2],["Series",1]] },
  { q: "Miss me? 👀", options: [["Yes",2],["No",0],["Maybe",1],["Next 🙄",1]] },
  { q: "If I vanish 1 day? 😏", options: [["Peace",0],["Notice",1],["Text first",2],["FBI 🔍",2]] },
  { q: "Rate me 😌", options: [["10/10",2],["11/10",3],["9/10",1],["No answer 😏",2]] },
  { q: "Flirt or behave? 😇", options: [["Flirt 😏",3],["Behave",0],["Depends",1],["You can’t behave",2]] }
];

function startQuiz() {
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("quizPage").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  if (qIndex >= questions.length) {
    showResult();
    return;
  }

  const q = questions[qIndex];
  document.getElementById("question").innerText = q.q;
  document.getElementById("question").classList.add("fade");

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt[0];
    btn.onclick = () => selectOption(opt[1]);
    btn.classList.add("fade");
    optionsDiv.appendChild(btn);
  });

  updateProgress();
}

function selectOption(points) {
  score += points;

  const reactions = [
    "Hmm 🤨",
    "Interesting 😏",
    "Noted 😂",
    "Okay okay 👀",
    "Caught you 😌"
  ];

  document.getElementById("reaction").innerText =
    reactions[Math.floor(Math.random() * reactions.length)];

  qIndex++;
  setTimeout(loadQuestion, 700);
}

function updateProgress() {
  const progress = ((qIndex) / questions.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

function showResult() {
  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");

  let text = "";

  if (score >= 18) {
    text = name + ", this is dangerous… you’re clearly obsessed with me 😌";
  } else if (score >= 12) {
    text = "Okay okay… you like me more than you admit 😏";
  } else {
    text = "You’re acting innocent… I don’t trust this score 😂";
  }

  document.getElementById("resultText").innerText = text;
}
</script>

</body>
</html>
