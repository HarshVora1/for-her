<script>

const questions = [

function startQuiz() {
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("quizPage").classList.remove("hidden");
  loadQuestion();
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById("timerBar").style.opacity = "0";
}

function removeRunaway() {
  if (runawayBtn) { runawayBtn.remove(); runawayBtn = null; }
}

function loadQuestion() {
  clearTimer(); removeRunaway();
  if (qIndex >= questions.length) { showResult(); return; }
  const q = questions[qIndex];
  document.getElementById("qCount").innerText = `Question ${qIndex + 1} of ${questions.length}`;
  document.getElementById("question").innerText = q.q;
  document.getElementById("reaction").innerText = "";
  document.getElementById("options").innerHTML = "";
  updateProgress();

  if      (q.type === "runaway") buildRunaway(q);
  else if (q.type === "timed")   { buildNormal(q); startTimer(q); }
  else if (q.type === "shake")   buildShake(q);
  else if (q.type === "order")   buildOrder(q);
  else                           buildNormal(q);
}

function pickBtn(btn, points, reaction, answerLabel) {
  clearTimer(); removeRunaway();
  document.querySelectorAll(".opt-btn").forEach(b => { b.onclick = null; b.classList.add("dimmed"); });
  btn.classList.remove("dimmed");
  btn.classList.add("selected");
  score += points;

  // Store the answer using the question text as key
  const qText = questions[qIndex].q;
  answers[`Q${qIndex + 1}: ${qText}`] = answerLabel || btn.innerText;

  document.getElementById("reaction").innerText = reaction || "Noted 😏";
  qIndex++;
  setTimeout(loadQuestion, 850);
}

function buildNormal(q) {
  const div = document.getElementById("options");
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerText = opt[0];
    btn.onclick = () => pickBtn(btn, opt[1], q.reaction, opt[0]);
    div.appendChild(btn);
  });
}

function buildShake(q) {
  const div = document.getElementById("options");
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerText = opt[0];
    if (opt[2] === "wrong") {
      btn.onclick = () => {
        btn.classList.add("wrong-flash");
        setTimeout(() => btn.classList.remove("wrong-flash"), 500);
        const card = document.getElementById("quizPage");
        card.classList.remove("shaking"); void card.offsetWidth; card.classList.add("shaking");
        setTimeout(() => card.classList.remove("shaking"), 500);
        document.getElementById("reaction").innerText = q.shakeReaction;
      };
    } else {
      btn.onclick = () => pickBtn(btn, opt[1], q.reaction, opt[0]);
    }
    div.appendChild(btn);
  });
}

function buildOrder(q) {
  const div = document.getElementById("options");
  const btns = [];
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerText = opt[0];
    btn.onclick = () => pickBtn(btn, opt[1], q.reaction, opt[0]);
    div.appendChild(btn);
    btns.push(btn);
  });
  setTimeout(() => {
    const shuffled = [...btns].sort(() => Math.random() - 0.5);
    shuffled.forEach(b => div.appendChild(b));
    document.getElementById("reaction").innerText = "shuffled so you can't just pick first 😇";
    setTimeout(() => {
      const r = document.getElementById("reaction");
      if (r.innerText.startsWith("shuffled")) r.innerText = "";
    }, 1200);
  }, 650);
}

function buildRunaway(q) {
  const div = document.getElementById("options");
  const yesOpt = q.options.find(o => o[2] !== "runaway");
  const noOpt  = q.options.find(o => o[2] === "runaway");

  const yesBtn = document.createElement("button");
  yesBtn.className = "opt-btn";
  yesBtn.innerText = yesOpt[0];
  yesBtn.onclick = () => { removeRunaway(); pickBtn(yesBtn, yesOpt[1], q.reaction, yesOpt[0]); };
  div.appendChild(yesBtn);

  const rb = document.createElement("button");
  rb.className = "runaway-btn";
  rb.innerText = noOpt[0];
  document.body.appendChild(rb);
  runawayBtn = rb;

  setTimeout(() => {
    const rect = div.getBoundingClientRect();
    rb.style.left = rect.left + "px";
    rb.style.top  = (rect.top + 64) + "px";
  }, 60);

  function flee(e) {
    const cx = e.clientX ?? e.touches?.[0]?.clientX ?? window.innerWidth / 2;
    const cy = e.clientY ?? e.touches?.[0]?.clientY ?? window.innerHeight / 2;
    const r  = rb.getBoundingClientRect();
    const bx = r.left + r.width / 2, by = r.top + r.height / 2;
    const dx = bx - cx, dy = by - cy;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;
    const push = 165, margin = 18;
    let nx = bx + (dx / d) * push - r.width / 2;
    let ny = by + (dy / d) * push - r.height / 2;
    nx = Math.max(margin, Math.min(window.innerWidth  - r.width  - margin, nx));
    ny = Math.max(margin, Math.min(window.innerHeight - r.height - margin, ny));
    rb.style.left = nx + "px";
    rb.style.top  = ny + "px";
  }
  rb.addEventListener("mouseover", flee);
  rb.addEventListener("touchstart", flee, { passive: true });
}

function startTimer(q) {
  const bar  = document.getElementById("timerBar");
  const fill = document.getElementById("timerFill");
  bar.style.opacity = "1";
  fill.style.transition = "none"; fill.style.width = "100%";
  let elapsed = 0;
  const total = q.timerSecs * 1000, tick = 50;
  setTimeout(() => {
    fill.style.transition = `width ${q.timerSecs}s linear`;
    fill.style.width = "0%";
  }, 80);
  timerInterval = setInterval(() => {
    elapsed += tick;
    if (elapsed >= total) {
      clearInterval(timerInterval); timerInterval = null;
      document.querySelectorAll(".opt-btn").forEach(b => { b.onclick = null; b.classList.add("dimmed"); });
      score += q.forcedPoints;
      // Record forced answer
      answers[`Q${qIndex + 1}: ${q.q}`] = "⏱️ Timed out — " + q.forcedAnswer;
      document.getElementById("reaction").innerText = q.forcedAnswer;
      qIndex++;
      setTimeout(loadQuestion, 1600);
    }
  }, tick);
}

function updateProgress() {
  document.getElementById("progressBar").style.width = (qIndex / questions.length * 100) + "%";
}

async function submitToFormspree(resultLabel) {
  const payload = {
    ...answers,
    "Final Score": score,
    "Result": resultLabel,
    "Completed At": new Date().toLocaleString()
  };

  try {
    await fetch("https://formspree.io/f/mjgaqzbp", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    // silent fail — she never needs to know 😌
  }
}

function showResult() {
  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");

  const max = questions.reduce((s, q) => s + Math.max(...q.options.map(o => o[1])), 0);
  const pct = score / max;

  let emoji, text, verdict, resultLabel;
  if (pct >= 0.78) {
    emoji = "🫶";
    text = "The results are embarrassingly clear. Every answer pointed the same direction. The nail set situation is the only unresolved matter.";
    verdict = "Official verdict: she acts unbothered. She is not unbothered. 😌";
    resultLabel = "Completely obsessed (won't admit it)";
  } else if (pct >= 0.55) {
    emoji = "😏";
    text = "Carefully answered. Very carefully. Like someone who knows this is being monitored. The ahem option, however, was unguarded.";
    verdict = "Official verdict: the real answers are between the lines. 👀";
    resultLabel = "Trying to play it cool. Failing.";
  } else if (pct >= 0.35) {
    emoji = "🙃";
    text = "Hard to read. Suspiciously composed. The tadgola ice cream appreciation though — that one was real.";
    verdict = "Official verdict: the poker face is strong. So is the denial. 😇";
    resultLabel = "Strong poker face. Very suspicious.";
  } else {
    emoji = "😂";
    text = "Either the gifts, the trips, the photos and the tadgola ice cream meant nothing — or someone is playing a very committed game of unbothered. Statistically unlikely.";
    verdict = "Official verdict: Harsh doesn't believe a single answer here. 😂";
    resultLabel = "Maximum denial. Iconic.";
  }

  document.getElementById("resultEmoji").innerText = emoji;
  document.getElementById("resultText").innerText = text;
  document.getElementById("verdictLine").innerText = verdict;

  // Send everything to Formspree silently
  submitToFormspree(resultLabel);
}

function restart() {
  score = 0; qIndex = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  clearTimer(); removeRunaway();
  document.getElementById("final").classList.add("hidden");
  document.getElementById("startPage").classList.remove("hidden");
