<!DOCTYPE html>
<html>
<head>
  <title>Important Survey 😌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ffe6f0, #fff0f5);
      padding: 20px;
      overflow: hidden;
    }

    h1, h2 {
      color: #ff4d88;
    }

    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: #ff66a3;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #reaction {
      margin-top: 10px;
      font-style: italic;
      color: #555;
      min-height: 20px;
    }

    .hidden { display: none; }

    #progressBar {
      width: 0%;
      height: 8px;
      background: #ff4d88;
      border-radius: 10px;
      transition: width 0.4s ease;
      margin-bottom: 15px;
    }

    #progressContainer {
      width: 100%;
      background: #ffd6e7;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<!-- START -->
<div id="startPage">
  <h1>Hey 😌</h1>
  <p>This is a very serious test. No cheating 😂</p>
  <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quizPage" class="hidden">
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <h2 id="question"></h2>
  <div id="options"></div>
  <div id="reaction"></div>
</div>

<!-- FINAL -->
<div id="final" class="hidden">
  <h1>Results are in… 😏</h1>
  <p id="resultText"></p>
  <p>Conclusion: I’m still your favorite person 😌</p>
</div>

<script>
const name = "YOU"; // change name

let score = 0;
let qIndex = 0;

const questions = [

  {
    q: "Harsh is the most beautiful boy ever? 😌",
    options: [
      ["Yes obviously 😍", 3],
      ["No 😏", 0, "noButton"]
    ]
  },

  {
    q: "Be honest… you enjoy talking to me, right? 😏",
    options: [
      ["Yes", 2],
      ["No", 0],
      ["Sometimes", 1],
      ["Depends on my mood 😂", 1]
    ]
  },

  {
    q: "If I stop texting you suddenly… 😌",
    options: [
      ["I won’t notice", 0],
      ["I’ll notice", 1],
      ["I’ll text first", 2],
      ["I’ll stalk you 😂", 3]
    ]
  },

  {
    q: "What am I to you? 👀",
    options: [
      ["Friend 🙂", 1],
      ["Best person ever 😌", 3],
      ["Annoying but nice", 2],
      ["Confusing 😂", 2]
    ]
  },

  {
    q: "Do you miss me sometimes? 😏",
    options: [
      ["Yes", 2],
      ["No", 0],
      ["Maybe", 1],
      ["I won’t admit", 3]
    ]
  },

  {
    q: "If we meet right now? 😌",
    options: [
      ["Food first", 2],
      ["Long drive", 2],
      ["Fight then chill", 2],
      ["Ignore you", 0]
    ]
  },

  {
    q: "How important am I? 😏",
    options: [
      ["Very", 2],
      ["Normal", 1],
      ["Not much", 0],
      ["Don’t ask tough questions 😂", 2]
    ]
  },

  {
    q: "You think about me randomly? 👀",
    options: [
      ["Yes", 2],
      ["No", 0],
      ["Sometimes", 1],
      ["Stop exposing me 😭", 3]
    ]
  },

  {
    q: "Rate my personality 😌",
    options: [
      ["10/10", 3],
      ["11/10", 4],
      ["9/10", 2],
      ["Could improve 😂", 1]
    ]
  },

  {
    q: "Final question… should I flirt or behave? 😇",
    options: [
      ["Flirt 😏", 3],
      ["Behave 🙂", 0],
      ["Depends", 1],
      ["You can’t behave anyway", 2]
    ]
  }

];

function startQuiz() {
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("quizPage").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  if (qIndex >= questions.length) {
    showResult();
    return;
  }

  const q = questions[qIndex];
  document.getElementById("question").innerText = q.q;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt[0];

    if (opt[2] === "noButton") {
      btn.onmouseover = () => moveButton(btn);
      btn.ontouchstart = () => moveButton(btn);
    } else {
      btn.onclick = () => selectOption(opt[1]);
    }

    optionsDiv.appendChild(btn);
  });

  updateProgress();
}

function moveButton(btn) {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function selectOption(points) {
  score += points;

  const reactions = [
    "Hmm 🤨",
    "Interesting 😏",
    "Noted 😂",
    "Caught you 😌",
    "Suspicious 👀"
  ];

  document.getElementById("reaction").innerText =
    reactions[Math.floor(Math.random() * reactions.length)];

  qIndex++;
  setTimeout(loadQuestion, 600);
}

function updateProgress() {
  const progress = (qIndex / questions.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

function showResult() {
  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");

  let text = "";

  if (score >= 20) {
    text = name + ", this is dangerous… you clearly like me a LOT 😌";
  } else if (score >= 12) {
    text = "Okay okay… you like me more than you admit 😏";
  } else {
    text = "You’re pretending… I don’t trust this 😂";
  }

  document.getElementById("resultText").innerText = text;
}
</script>

</body>
</html>
